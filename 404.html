<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found · Fahim Ahamed | Data & AI</title>
    <meta name="description" content="The page you were looking for could not be found." />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="favicon.png?v=2" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0f766e" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c1410" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=43" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      .notfound {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 76px);
        padding: 80px 24px;
        text-align: center;
      }
      .notfound-code {
        margin: 0 0 8px;
        color: var(--rust);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      .notfound h1 {
        max-width: 18ch;
        margin: 0 auto 16px;
        font-size: clamp(3rem, 7vw, 5.5rem);
        line-height: 0.96;
      }
      .notfound p {
        max-width: 56ch;
        margin: 0 auto 28px;
        color: var(--muted);
        font-size: clamp(1.05rem, 1.6vw, 1.2rem);
      }
      .notfound-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      .notfound-suggested {
        margin-top: 48px;
        font-size: 0.92rem;
        color: var(--muted);
      }
      .notfound-suggested a {
        margin: 0 6px;
        color: var(--accent-dark);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
    </header>

    <main class="notfound">
      <div>
        <p class="notfound-code">Error 404</p>
        <h1>This page wandered off.</h1>
        <p>The link you followed might be broken, or the page may have moved. Either way &mdash; you're a click away from finding your bearings.</p>
        <div class="notfound-actions">
          <a class="button primary" href="/">Back to Home</a>
          <a class="button secondary" href="/writing.html">Browse Articles</a>
        </div>
      </div>
    </main>

    <script src="/site.js?v=3" defer></script>
  </body>
</html>
