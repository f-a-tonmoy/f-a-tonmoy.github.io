<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found · Fahim Ahamed | Data & AI</title>
    <meta name="description" content="The page you were looking for could not be found." />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=13" />
    <style>
      .notfound {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 76px);
        padding: 80px 24px;
        text-align: center;
      }
      .notfound-code {
        margin: 0 0 8px;
        color: var(--rust);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      .notfound h1 {
        max-width: 18ch;
        margin: 0 auto 16px;
        font-size: clamp(3rem, 7vw, 5.5rem);
        line-height: 0.96;
      }
      .notfound p {
        max-width: 56ch;
        margin: 0 auto 28px;
        color: var(--muted);
        font-size: clamp(1.05rem, 1.6vw, 1.2rem);
      }
      .notfound-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      .notfound-suggested {
        margin-top: 48px;
        font-size: 0.92rem;
        color: var(--muted);
      }
      .notfound-suggested a {
        margin: 0 6px;
        color: var(--accent-dark);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Home">Home</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="/experience.html">Experience</a>
        <a href="/research.html">Research</a>
        <a href="/projects.html">Projects</a>
        <a href="/writing.html">Articles</a>
        <a class="nav-mobile-action" href="/assets/Resume%20-%20Fahim%20Ahamed.pdf" target="_blank" rel="noopener">Resume</a>
        <a class="nav-mobile-action" href="https://linkedin.com/in/f-a-tonmoy">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="header-cta" href="/assets/Resume%20-%20Fahim%20Ahamed.pdf" target="_blank" rel="noopener">Resume</a>
        <a class="header-cta" href="https://linkedin.com/in/f-a-tonmoy">Contact</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main class="notfound">
      <div>
        <p class="notfound-code">Error 404</p>
        <h1>This page wandered off.</h1>
        <p>The link you followed might be broken, or the page may have moved. Either way &mdash; you're a click away from finding your bearings.</p>
        <div class="notfound-actions">
          <a class="button primary" href="/">Back to Home</a>
          <a class="button secondary" href="/writing.html">Browse Articles</a>
        </div>
      </div>
    </main>

    <script>
      (function () {
        var toggle = document.querySelector('.nav-toggle');
        var nav = document.querySelector('.nav');
        if (toggle && nav) {
          toggle.addEventListener('click', function () {
            var open = nav.classList.toggle('open');
            toggle.classList.toggle('open', open);
            toggle.setAttribute('aria-expanded', String(open));
          });
        }
      })();
    </script>
  </body>
</html>
