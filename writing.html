<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Articles · Fahim Ahamed | Data & AI</title>
    <meta name="description" content="Recent data science, machine learning, AI, statistics, and responsible AI writing by Fahim Ahamed." />
    <link rel="canonical" href="https://f-a-tonmoy.github.io/writing.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://f-a-tonmoy.github.io/writing.html" />
    <meta property="og:title" content="Articles · Fahim Ahamed | Data & AI" />
    <meta property="og:description" content="80+ articles on data science, machine learning, AI safety, statistics, and modern ML practice." />
    <meta property="og:image" content="https://f-a-tonmoy.github.io/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Articles · Fahim Ahamed" />
    <meta name="twitter:description" content="80+ articles on data science, machine learning, AI safety, statistics, and modern ML practice." />
    <meta name="twitter:image" content="https://f-a-tonmoy.github.io/assets/og-image.png" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0f766e" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131c18" />
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=86" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (err) {}
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
    </header>

    <main>
      <section class="page-hero section">
        <p class="eyebrow">Articles</p>
        <h1>Technical writing on data science, machine learning, & responsible AI.</h1>
        <p class="lede">
          81 articles explaining model behavior, statistics, data quality, AI safety,
          recommendation systems, explainability, and modern machine learning practice.
        </p>
      </section>

      <section class="section page-section">
        <div class="writing-toolbar" aria-label="Article categories">
          <button class="tab-button active" type="button" data-filter="All">All</button>
          <button class="tab-button" type="button" data-filter="Data Science">Data Science</button>
          <button class="tab-button" type="button" data-filter="Machine Learning">Machine Learning</button>
          <button class="tab-button" type="button" data-filter="Deep Learning">Deep Learning</button>
          <button class="tab-button" type="button" data-filter="Explainable AI">Explainable AI</button>
          <button class="tab-button" type="button" data-filter="Responsible AI">Responsible AI</button>
        </div>
        <div class="article-search-row">
          <label class="article-search">
            <span class="visually-hidden">Search articles</span>
            <input id="article-search-input" type="search" placeholder="Search articles by title..." autocomplete="off" />
          </label>
          <div class="article-count" id="article-count" aria-live="polite"></div>
        </div>
        <div class="article-card-grid" id="article-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
    </footer>

    <script src="site.js?v=12" defer></script>
    <script src="articles.js?v=2"></script>
    <script>
      const grid = document.querySelector('#article-grid');
      const count = document.querySelector('#article-count');
      const tabs = Array.from(document.querySelectorAll('.tab-button'));
      const searchInput = document.querySelector('#article-search-input');

      let activeCategory = 'All';
      let searchTerm = '';

      function articleCard(article) {
        const image = article.image
          ? `<img src="${article.image}" alt="" loading="lazy" onerror="this.closest('.article-thumb').classList.add('is-empty'); this.remove();" />`
          : '';
        return `
          <a class="article-card" href="${article.url}" target="_blank" rel="noopener">
            <span class="article-thumb ${article.image ? '' : 'is-empty'}" data-fallback="${article.category}">${image}</span>
            <span class="article-body">
              <span class="article-category">${article.category}</span>
              <span class="article-title">${article.title}</span>
            </span>
          </a>
        `;
      }

      function render() {
        const term = searchTerm.trim().toLowerCase();
        const filtered = articles.filter((article) => {
          const matchesCategory = activeCategory === 'All' || article.category === activeCategory;
          const matchesSearch = !term || article.title.toLowerCase().includes(term);
          return matchesCategory && matchesSearch;
        });
        if (filtered.length === 0) {
          grid.innerHTML = '<p class="article-empty">No articles match your search.</p>';
        } else {
          grid.innerHTML = filtered.map(articleCard).join('');
        }
        count.textContent = `${filtered.length} article${filtered.length === 1 ? '' : 's'}`;
      }

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((item) => item.classList.remove('active'));
          tab.classList.add('active');
          activeCategory = tab.dataset.filter;
          render();
        });
      });

      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          searchTerm = event.target.value;
          render();
        });
      }

      render();
    </script>
  </body>
</html>
